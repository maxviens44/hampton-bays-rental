<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    .frame {
      width: 1200px;
      height: 630px;
      position: relative;
      background-image: url('https://staythehamptons.com/images/pool2.webp');
      background-size: cover;
      background-position: center 40%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(5,5,5,0.88) 0%,
        rgba(5,5,5,0.70) 45%,
        rgba(5,5,5,0.25) 100%
      );
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 72px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: #c9a96e;
    }

    .title {
      font-size: 72px;
      font-weight: 400;
      line-height: 1.0;
      color: #ffffff;
      margin-bottom: 20px;
      font-style: italic;
    }

    .title span {
      color: #dfc090;
      font-style: italic;
    }

    .specs {
      display: flex;
      gap: 32px;
      margin-bottom: 36px;
      margin-top: 8px;
    }

    .spec {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: #b0a898;
      letter-spacing: 0.05em;
    }

    .spec-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #c9a96e;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #c9a96e;
      color: #0a0a0a;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 14px 28px;
      font-family: 'Georgia', serif;
      width: fit-content;
    }

    .badge {
      position: absolute;
      top: 48px;
      right: 60px;
      text-align: right;
    }

    .badge-stars {
      font-size: 18px;
      color: #c9a96e;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .badge-text {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a7060;
    }

    .domain {
      position: absolute;
      bottom: 44px;
      right: 60px;
      font-size: 13px;
      letter-spacing: 0.15em;
      color: #5a5040;
      text-transform: lowercase;
    }

    .border-frame {
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(201,169,110,0.2);
      pointer-events: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    .title, .eyebrow, .cta { font-family: 'Cormorant Garamond', 'Georgia', serif; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="overlay"></div>
    <div class="border-frame"></div>

    <div class="badge">
      <div class="badge-stars">★★★★★</div>
      <div class="badge-text">5-Star Rated</div>
    </div>

    <div class="content">
      <div class="eyebrow">Hampton Bays, New York</div>
      <div class="title">Stay The<br><span>Hamptons</span></div>
      <div class="specs">
        <div class="spec">4 Bedrooms</div>
        <div class="spec-dot"></div>
        <div class="spec">5 Baths</div>
        <div class="spec-dot"></div>
        <div class="spec">Sleeps 10</div>
        <div class="spec-dot"></div>
        <div class="spec">Heated Pool</div>
      </div>
      <div class="cta">Book Direct · No Platform Fees</div>
    </div>

    <div class="domain">staythehamptons.com</div>
  </div>
</body>
</html>
