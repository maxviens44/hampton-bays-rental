[build]
  command = "npm install vite-ssg && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/test"
  to = "/test/index.html"
  status = 200

[[redirects]]
  from = "/test/*"
  to = "/test/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
