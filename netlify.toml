[build]
  command = "echo 'Static site - no build needed'"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/test"
  to = "/test/index.html"
  status = 200

[[redirects]]
  from = "/test/*"
  to = "/test/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
